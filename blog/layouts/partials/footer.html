<ul class="footer__links">
    {{ range $item := .Site.Params.socialLinks }}
    <li>
        <a href="{{ $item.url }}" rel="me" aria-label="{{ $item.title }}" title="{{ $item.title }}">{{ printf "static/icons/%s.svg" $item.icon | readFile | replaceRE "<svg " "<svg class=\"icon\" fill=\"currentColor\" " | safeHTML }}</a>
    </li>
    {{ end }}
</ul>
{{ $emoji := index (shuffle (slice "🚴" "🚵" "⛷️" "🏕️" "🧗" "☕️" "🍺" "🌲" "🏔️" "🥘" "🌯" "🍕" "🍣" "🐈‍⬛")) 0 -}}
<p class="copyright">made with {{ $emoji }} in boulder, co</p>
